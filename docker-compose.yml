services:
  gateway:
    build:
      context: .
    container_name: gemini_gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GEMINI_WORKING_DIR: /workspace
    volumes:
      - ./workspace:/workspace
      - gemini_home:/root/.gemini
      - gateway_state:/app/.gateway_state

volumes:
  gemini_home:
  gateway_state:
